name: Release Validator

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  validate-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Make Gradle Wrapper Executable
      run: chmod +x railflow-backend/gradlew

    - name: Verify Build & Tests
      run: ./railflow-backend/gradlew clean build -p railflow-backend

    - name: Output Release Verification Logs
      run: echo "Release verification successfully completed."
