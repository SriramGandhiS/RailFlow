name: Daily Engineering Audit

on:
  schedule:
    - cron: '0 0 * * *' # Midnight daily
  workflow_dispatch:

jobs:
  run-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run Daily Audit Script
      run: python scripts/generate_daily_audit.py

    - name: Commit and Push Audit Report
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/DAILY_AUDIT.md
        git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-update daily audit report" && git push)
