name: Build Failure Issue Creator

on:
  workflow_run:
    workflows: ["Build Verification"]
    types:
      - completed

jobs:
  create-issue:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    permissions:
      issues: write

    steps:
    - name: Create Issue on Build Failure
      uses: actions/github-script@v7
      with:
        script: |
          const runId = context.payload.workflow_run.id;
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;
          const issueTitle = `🚨 CI Build Failure (Run #${context.payload.workflow_run.run_number})`;
          const issueBody = `The Build Verification workflow has failed.\n\n` +
                            `- **Workflow Run Details**: [View Logs and Run Output](${runUrl})\n` +
                            `- **Commit Message**: ${context.payload.workflow_run.head_commit.message}\n` +
                            `- **Author**: ${context.payload.workflow_run.head_commit.author.name}\n\n` +
                            `Please review the logs, fix compile or test failures, and push an updated commit.`;
          
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: issueTitle,
            body: issueBody,
            labels: ['bug', 'ci-failure']
          });
