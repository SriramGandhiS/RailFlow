name: Test Execution

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Make Gradle Wrapper Executable
      run: chmod +x railflow-backend/gradlew

    - name: Run Tests
      run: ./railflow-backend/gradlew test -p railflow-backend

    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      with:
        name: gradle-test-reports
        path: railflow-backend/build/reports/tests/test/
