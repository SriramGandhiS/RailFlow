name: Daily Status Report

on:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight UTC
  workflow_dispatch: # Allow manual triggers

jobs:
  generate-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetch all history for commit counting

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run Status Generation Script
      run: python scripts/generate_status.py

    - name: Commit and Push Status Report
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/WEEKLY_STATUS.md
        git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-update daily status report" && git push)
