spring:
  datasource:
    url: ${POSTGRES_URL:jdbc:h2:mem:railflow;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${POSTGRES_USER:sa}
    password: ${POSTGRES_PASS:sa}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
  flyway:
    enabled: true
